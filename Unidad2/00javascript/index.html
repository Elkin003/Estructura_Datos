<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Condicionales en JavaScript</title>
</head>

<body>
  <h1>Condicionales en JavaScript</h1>
  <hr>

  <h2>Condicional If / Else If / Else</h2>
  <p>Ingrese una nota (0-10):</p>
  <input type="number" id="nota">
  <button onclick="probarNota()">Evaluar Nota</button>
  <p>Resultado: <b id="resultadoNota"></b></p>
  <hr>

  <h2>Switch</h2>
  <p>Seleccione un color:</p>
  <select id="semaforo">
    <option value="rojo">Rojo</option>
    <option value="amarillo">Amarillo</option>
    <option value="verde">Verde</option>
    <option value="azul">Azul</option>
  </select>
  <button onclick="probarSemaforo()">Evaluar Semáforo</button>
  <p>Resultado: <b id="resultadoSemaforo"></b></p>
  <hr>

  <h2>Operador Ternario</h2>
  <p>Ingrese una edad:</p>
  <input type="number" id="edad">
  <button onclick="probarEdad()">Evaluar Edad</button>
  <p>Resultado: <b id="resultadoEdad"></b></p>

  <script src="clase-condicional.js"></script>
</body>

</html>
